# Lisa config — default (local/general)
# Installed to ~/.zeroclaw/config.toml by setup-lisa.sh.
# Provider, API key, etc. are injected from .env via environment variables.
default_temperature = 0.7

auto_approve = ["file_read", "memory_recall", "web_fetch", "web_search", "web_search_tool", "skills", "shell"]
allowed_commands = ["git", "npm", "cargo", "ls", "cat", "grep", "find", "echo", "pwd", "wc", "head", "tail", "date", "gog", "memo", "remindctl", "jq", "python3", "bash"]

[channels_config]
cli = true

# Telegram is activated by setup.sh after bot token injection from .env
# [channels_config.telegram]
# bot_token = "injected from environment variable"
# allowed_users = ["YOUR_USER_ID"]
# mention_only = true

[gateway]
port = 42617
bind = "127.0.0.1"
