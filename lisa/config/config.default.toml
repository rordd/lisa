# Lisa config — unified
# Installed to ~/.zeroclaw/config.toml by install.sh.
# Provider, model, API key are injected from .env via ZEROCLAW_* environment variables.
default_temperature = 1.0

[channels_config]
cli = true

# Telegram is activated by setup.sh after bot token injection from .env
# [channels_config.telegram]
# bot_token = "injected from environment variable"
# allowed_users = ["YOUR_USER_ID"]
# mention_only = true

[gateway]
port = 42617
bind = "127.0.0.1"
require_pairing = false

[autonomy]
level = "full"
workspace_only = false
allowed_commands = ["git", "npm", "cargo", "ls", "cat", "grep", "find", "echo", "pwd", "wc", "head", "tail", "date", "gog", "memo", "remindctl", "jq", "python3", "bash", "curl", "luna-send"]
auto_approve = ["file_read", "memory_recall", "web_fetch", "web_search", "web_search_tool", "skills", "shell"]
shell_env_passthrough = ["GOG_ACCOUNT", "GOG_KEYRING_PASSWORD", "GOG_KEYRING_BACKEND"]
forbidden_paths = []
max_actions_per_hour = 100
max_cost_per_day_cents = 1000
non_cli_excluded_tools = []
block_high_risk_commands = false

[memory]
backend = "markdown"
auto_save = true

[skills]
allow_scripts = true

[security.url_access]
enforce_domain_allowlist = false

[security.sandbox]
backend = "none"
