# Lisa config
# All secrets and personal info are in .env via environment variables.
# This file contains only app settings — safe to commit.
#
# Key env vars (see .env.example):
#   ZEROCLAW_API_KEY, ZEROCLAW_PROVIDER, ZEROCLAW_MODEL
#   TELEGRAM_BOT_TOKEN, TELEGRAM_ALLOWED_USERS, TELEGRAM_MENTION_ONLY
#   GOG_ACCOUNT, GOG_KEYRING_PASSWORD, GOG_KEYRING_BACKEND
# default_temperature = 0.7 (code default; override via ZEROCLAW_TEMPERATURE in .env)
provider_timeout_secs = 300

[a2ui]
enabled = false

[a2web]
enabled = false

[channels_config]
cli = true
# Telegram: activated via TELEGRAM_BOT_TOKEN env var (see .env)

[channels_config.lisa]
enabled = true
path = "/app"

[gateway]
port = 42617
host = "0.0.0.0"
allow_public_bind = true
require_pairing = false

[autonomy]
level = "full"
workspace_only = false
allowed_commands = ["git", "npm", "cargo", "ls", "cat", "grep", "find", "echo", "pwd", "wc", "head", "tail", "date", "gog", "memo", "remindctl", "jq", "python3", "bash", "sh", "cd", "curl", "luna-send"]
auto_approve = ["file_read", "memory_recall", "web_fetch", "web_search", "web_search_tool", "skills", "shell"]
shell_env_passthrough = ["GOG_ACCOUNT", "GOG_KEYRING_PASSWORD", "GOG_KEYRING_BACKEND", "KAKAO_REST_API_KEY", "GOOGLE_MAPS_API_KEY", "NAVER_CLIENT_ID", "NAVER_CLIENT_SECRET"]
forbidden_paths = []
max_actions_per_hour = 100
max_cost_per_day_cents = 1000
non_cli_excluded_tools = [
  "openclaw_migration", "proxy_config", "manage_auth_profile",
  "check_provider_quota", "switch_provider", "estimate_quota_cost",
  "pushover", "screenshot", "image_info", "model_routing_config",
  "web_search_config", "web_access_config", "channel_ack_config",
  "task_plan", "process", "apply_patch",
  "pdf_read", "docx_read", "pptx_read", "xlsx_read",
  "bg_run", "bg_status"
]
block_high_risk_commands = false

[memory]
backend = "markdown"
auto_save = true

[skills]
allow_scripts = true


[agent]
max_tool_iterations = 20
parallel_tools = true

[security.sandbox]
backend = "none"

[web_fetch]
enabled = true

# ── Model Routes (Tier Routing) ──────────────────────────────
# Route queries to different models based on classification hints.
# Unmatched queries use the default model (env: ZEROCLAW_MODEL).
#
# [[model_routes]]
# hint = "simple"
# provider = "custom:https://example.com/openai/v1"
# model = "gpt-5.4-nano"
#
# [[model_routes]]
# hint = "heavy"
# provider = "custom:https://example.com/openai/v1"
# model = "gpt-5.4"

# ── Query Classification ─────────────────────────────────────
# Classify user messages to select a model route hint.
# Supports keywords (case-insensitive), patterns (case-sensitive),
# regex_patterns (case-insensitive), and length constraints.
#
# [query_classification]
# enabled = true
#
# [[query_classification.rules]]
# hint = "simple"
# regex_patterns = [
#   "^.{0,20}(weather|날씨|기온).{0,10}$",
#   "^(hello|hi|안녕|고마워).{0,10}$",
# ]
# max_length = 30
# priority = 50
#
# [[query_classification.rules]]
# hint = "heavy"
# regex_patterns = [
#   "browser.*(open|control|automate)",
#   "(app|server).*(create|build|develop)",
# ]
# priority = 80

# ── Screen Control ──
# Anthropic Computer Use 호환 화면 제어.
# enabled=true 시 computer tool 등록, screenshot tool 비활성화 (exclusive).
[screen_control]
enabled = false
backend = "mac"
resize_width = 768
screenshot_delay_ms = 2000
