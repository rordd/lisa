<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lisa A2UI Test Client</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --md-sys-color-primary: #1a73e8;
      --md-sys-color-on-primary: #fff;
      --md-sys-color-surface: #fff;
      --md-sys-color-surface-variant: #f1f3f4;
      --md-sys-color-on-surface: #202124;
      --md-sys-color-on-surface-variant: #5f6368;
      --md-sys-color-outline: #dadce0;
      --md-sys-color-error: #d93025;
      font-family: 'Google Sans', 'Noto Sans KR', -apple-system, sans-serif;
      font-size: 14px;
      color: var(--md-sys-color-on-surface);
      background: #f8f9fa;
    }
    body { display: flex; flex-direction: column; height: 100vh; }

    header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px;
      background: var(--md-sys-color-surface);
      border-bottom: 1px solid var(--md-sys-color-outline);
    }
    header h1 { font-size: 18px; font-weight: 500; }
    #status {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--md-sys-color-on-surface-variant);
    }
    #status .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--md-sys-color-error);
    }
    #status.connected .dot { background: #34a853; }

    main {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .msg { max-width: 720px; width: 100%; margin: 0 auto; }
    .msg.user {
      align-self: flex-end;
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      padding: 10px 16px; border-radius: 18px 18px 4px 18px;
      margin-left: auto; max-width: 480px; width: fit-content;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.assistant {
      background: var(--md-sys-color-surface);
      padding: 12px 16px; border-radius: 4px 18px 18px 18px;
      border: 1px solid var(--md-sys-color-outline);
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.system {
      text-align: center; font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .msg .elapsed {
      display: inline-block; margin-left: 8px;
      font-size: 11px; color: #9aa0a6; font-weight: 400;
    }


    .thinking {
      max-width: 720px; width: 100%; margin: 0 auto;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--md-sys-color-surface);
      border-radius: 4px 18px 18px 18px;
      border: 1px solid var(--md-sys-color-outline);
      color: var(--md-sys-color-on-surface-variant);
      font-size: 13px;
    }
    .thinking .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--md-sys-color-outline);
      border-top-color: var(--md-sys-color-primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .thinking .timer { font-variant-numeric: tabular-nums; min-width: 36px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .a2ui-surface-container {
      max-width: 720px; width: 100%; margin: 0 auto;
    }
    .inspector-wrap { position: relative; }
    .copy-btn {
      display: block; width: 100%; padding: 8px 12px; margin-bottom: 4px;
      font-size: 13px; font-weight: 500;
      background: #3c4043; color: #e8eaed; border: 1px solid #5f6368;
      border-radius: 6px; cursor: pointer;
      -webkit-tap-highlight-color: rgba(66,133,244,0.3);
      touch-action: manipulation;
    }
    .copy-btn:hover, .copy-btn:active { background: #5f6368; }
    /* Style the official a2ui-surface to fit our layout */
    a2ui-surface {
      display: block;
      --a2ui-font-family: 'Google Sans', 'Noto Sans KR', -apple-system, sans-serif;
    }

    footer {
      padding: 12px 20px;
      background: var(--md-sys-color-surface);
      border-top: 1px solid var(--md-sys-color-outline);
    }
    .input-row {
      display: flex; gap: 8px; max-width: 720px; margin: 0 auto;
    }
    #chat-input {
      flex: 1; padding: 10px 16px; font-size: 14px;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 24px; outline: none; font-family: inherit;
    }
    #chat-input:focus { border-color: var(--md-sys-color-primary); }
    #send-btn {
      padding: 10px 20px; border: none; border-radius: 24px;
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      font-size: 14px; font-weight: 500; cursor: pointer;
    }
    #send-btn:disabled { opacity: .5; cursor: not-allowed; }

    .connect-bar {
      display: flex; gap: 8px; align-items: center;
      padding: 8px 20px;
      background: var(--md-sys-color-surface-variant);
      font-size: 13px;
    }
    .connect-bar input {
      flex: 1; max-width: 360px;
      padding: 6px 12px; border: 1px solid var(--md-sys-color-outline);
      border-radius: 8px; font-size: 13px;
    }
    .connect-bar button {
      padding: 6px 16px; border: 1px solid var(--md-sys-color-outline);
      border-radius: 8px; background: var(--md-sys-color-surface);
      cursor: pointer; font-size: 13px;
    }

    /* A2Web iframe */
    .a2web-container {
      max-width: 720px; width: 100%; margin: 0 auto;
    }
    .a2web-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: #e8f0fe; border-radius: 12px 12px 0 0;
      border: 1px solid #c2d7f2; border-bottom: none;
      font-size: 13px;
    }
    .a2web-label {
      background: #1a73e8; color: #fff;
      padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .a2web-title { font-weight: 500; color: #1a73e8; }
    .a2web-open {
      margin-left: auto; color: #1a73e8; text-decoration: none; font-size: 12px;
    }
    .a2web-open:hover { text-decoration: underline; }
    .a2web-iframe {
      width: 100%; height: 480px; border: 1px solid #c2d7f2;
      border-radius: 0 0 12px 12px; background: #fff;
    }

    /* Inspector */
    .inspector {
      border: 1px solid #dadce0; border-radius: 8px;
      overflow: hidden; margin-top: 8px;
    }
    .inspector summary {
      padding: 8px 12px; cursor: pointer; font-size: 12px;
      color: #5f6368; background: #f8f9fa; user-select: none;
    }
    .inspector pre {
      margin: 0; padding: 12px; font-size: 12px; line-height: 1.5;
      background: #1e1e1e; color: #d4d4d4; overflow-x: auto;
      max-height: 400px; overflow-y: auto;
    }
  </style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--md-sys-color-primary)">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
  </svg>
  <h1>Lisa A2UI Test Client</h1>
  <span style="font-size:11px;color:#9aa0a6;margin-left:4px">(A2UI v0.9)</span>
  <div id="status"><span class="dot"></span><span id="status-text">Disconnected</span></div>
  <button id="menu-btn" onclick="toggleMenu()" style="background:none;border:none;cursor:pointer;padding:4px;margin-left:8px">
    <span class="material-symbols-outlined" style="font-size:24px;color:var(--md-sys-color-on-surface-variant)">menu</span>
  </button>
</header>

<div id="session-menu" style="display:none;position:absolute;top:48px;right:12px;z-index:100;background:var(--md-sys-color-surface);border:1px solid var(--md-sys-color-outline);border-radius:12px;padding:16px;box-shadow:0 4px 12px rgba(0,0,0,.15);min-width:240px">
  <div style="font-size:14px;font-weight:500;margin-bottom:12px">세션 관리</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <select id="session-select" style="padding:8px 12px;border:1px solid var(--md-sys-color-outline);border-radius:8px;font-size:13px;width:100%">
      <option value="lisa-test">lisa-test</option>
    </select>
    <div style="display:flex;gap:8px">
      <button onclick="switchSession()" style="flex:1;padding:8px;border:1px solid var(--md-sys-color-primary);border-radius:8px;background:var(--md-sys-color-primary);color:#fff;cursor:pointer;font-size:13px">연결</button>
      <button onclick="newSession()" style="flex:1;padding:8px;border:1px solid var(--md-sys-color-outline);border-radius:8px;background:var(--md-sys-color-surface);cursor:pointer;font-size:13px">+ 새 세션</button>
      <button onclick="deleteSession()" style="padding:8px 12px;border:1px solid var(--md-sys-color-outline);border-radius:8px;background:var(--md-sys-color-surface);cursor:pointer;font-size:13px;color:var(--md-sys-color-error)">삭제</button>
    </div>
    <div style="font-size:11px;color:var(--md-sys-color-on-surface-variant);margin-top:4px">현재: <span id="current-session-label">lisa-test</span></div>
  </div>
</div>

<div class="connect-bar">
  <label>Gateway:</label>
  <input id="ws-url" type="text" />
  <button id="connect-btn" onclick="toggleConnection()">Connect</button>
</div>

<main id="messages"></main>

<footer>
  <div class="input-row">
    <input id="chat-input" type="text" placeholder="메시지를 입력하세요..." disabled
           onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}" />
    <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
  </div>
</footer>

<script type="module" src="/src/app.ts"></script>

</body>
</html>
