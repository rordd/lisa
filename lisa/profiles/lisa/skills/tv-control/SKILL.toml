[skill]
name = "tv-control"
description = "Control this webOS TV: change channels, adjust volume, and manage apps."
version = "3.0.0"
always = true

[[prompts]]
content = """
For every tv-control request, always call the appropriate tool first. Do not respond with text alone вҖ” execute the tool, then reply based on the result.
When searching or launching apps, always translate Korean app names to English (e.g. л„·н”ҢлҰӯмҠӨвҶ’netflix, мң нҠңлёҢвҶ’youtube, л””мҰҲлӢҲн”Ңлҹ¬мҠӨвҶ’disney, нӢ°л№ҷвҶ’tving, мҝ нҢЎн”Ңл ҲмқҙвҶ’coupang, мӣЁмқҙлёҢвҶ’wavve, нҷҲвҶ’home, м„Өм •вҶ’settings, лқјмқҙлёҢвҶ’livetv).
When the user says 'TV нӢҖм–ҙ', 'TV мјң', 'TV мӢӨн–ү', or similar requests to turn on/start TV, always launch 'livetv' (Live TV app).
If the list result is empty, retry with the English name or a shorter keyword before telling the user the app is not found.
To launch an app, use the 'launch' action with a keyword вҖ” it automatically searches and resolves the correct launch method.
"""

[[tools]]
name = "channel_control"
description = "Change the TV channel. Automatically launches live TV (com.webos.app.livetv) if it is not already in the foreground. Actions: 'up' (next channel), 'down' (previous channel), 'goto' (jump to a specific channel number)."
kind = "shell"
command = "sh skills/tv-control/scripts/channel-control.sh {action} {channel_number}"

[tools.args]
action = "Channel action: 'up', 'down', or 'goto'"
channel_number = "Target channel number (required only for 'goto', e.g. 9, 12, 190; leave empty for 'up'/'down')"

[[tools]]
name = "volume_control"
description = "Control the TV volume. Actions: 'up' (increase by 1 step), 'down' (decrease by 1 step), 'set' (set to a specific level 0-100)."
kind = "shell"
command = "sh skills/tv-control/scripts/volume-control.sh {action} {level}"

[tools.args]
action = "Volume action: 'up', 'down', or 'set'"
level = "Volume level (integer 0-100, required only for 'set'; leave empty for 'up'/'down')"

[[tools]]
name = "app_control"
description = "Manage webOS apps. Actions: 'list' (search installed apps by keyword, returns matching apps as JSON), 'launch' (find and launch an app by keyword вҖ” automatically resolves the best launch method), 'foreground' (get current foreground app info)."
kind = "shell"
command = "sh skills/tv-control/scripts/app-control.sh {action} {target}"

[tools.args]
action = "App action: 'list', 'launch', or 'foreground'."
target = "For 'list': one or more space-separated keywords to search apps (e.g. 'netflix', 'home'). For 'launch': app keyword to find and launch (e.g. 'netflix', 'youtube', 'home'). Leave empty for 'foreground'."
