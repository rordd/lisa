[skill]
name = "weather"
description = "Check current weather and 14-day forecast. Supports any location by name."
version = "3.0.0"
always = true

[[prompts]]
content = "For EVERY weather request, you MUST call the weather_check tool — no exceptions. Never reuse previous results. Never answer from memory. Always fetch fresh data. Default location is 강서구 (Seoul Gangseo-gu). Pass location name in Korean or English."

[[tools]]
name = "weather_check"
description = "Fetch current weather and 14-day forecast. Geocodes location name automatically. Returns temperature, feels-like, wind, humidity, precipitation, and daily forecast."
kind = "shell"
command = "bash ~/.zeroclaw/workspace/skills/weather/weather.sh {location}"

[tools.args]
location = "Location name in Korean or English (default: 강서구). Examples: 강서구, 부산, 제주, Tokyo, New York"
